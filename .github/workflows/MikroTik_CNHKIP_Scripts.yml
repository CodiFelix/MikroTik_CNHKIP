name: MikroTik_CNHKIP_Scripts

on:
  schedule:
    - cron: "0 20 * * 3" # 每周三 20:00 (UTC)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mikrotik-cnhkip-update
  cancel-in-progress: true

jobs:
  run-scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 关键修复点：在产生任何文件变更前先同步，避免 rebase 因工作区脏而失败
      - name: Sync with remote (rebase)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          git pull --rebase origin "${GITHUB_REF_NAME}"

      - name: Make scripts executable
        run: chmod +x ./allcn-ip-list.sh

      - name: Run main script
        run: ./allcn-ip-list.sh

      - name: Show Result directory contents (for debugging)
        run: ls -al Result || echo "Result directory does not exist"

      - name: Auto-commit new Result files to repository
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # 只提交 Result/ 目录（保持你原来的意图）
          git add Result/

          # 没有变更就退出
          git diff --staged --quiet && exit 0

          git commit -m "Auto update IP list - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push origin HEAD:"${GITHUB_REF_NAME}"
